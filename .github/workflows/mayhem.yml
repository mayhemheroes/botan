# The Mayhem worker: build the commit image from mayhem/Dockerfile, push it to ghcr, then run
# Mayhem (20 min) over each Mayhemfile. Runs on manual dispatch and is called by the sync cron
# (sync.yml) only when upstream actually moved — we fuzz on real upstream movement or an explicit
# dispatch, NOT on every commit to the mayhem branch.
# Fill in the `mayhemfile` matrix below. Needs the MAYHEM_TOKEN secret.
name: Mayhem

on:
  workflow_dispatch:             # manual on-demand run (gh workflow run mayhem.yml --ref mayhem)
    inputs:
      duration:
        description: 'Fuzz seconds per target (default 1200 = 20 min; e.g. 14400 = 4h). Longer needs a plan that allows it.'
        type: string
        required: false
        default: '1200'
  workflow_call:                 # sync.yml calls this (only when upstream moved), passing the rebased SHA
    inputs:
      ref:
        description: commit/branch to build (cron passes the freshly-rebased mayhem SHA)
        type: string
        required: false
        default: ''
      duration:                  # reusable callers (cron) leave the 20-min default; can request a longer run
        description: fuzz seconds per target
        type: string
        required: false
        default: '1200'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: build commit image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push the commit image to ghcr.io/<org>/<repo>
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full mayhem-branch history in the image (NOT shallow); see SPEC §6.2 item 2
          submodules: recursive
          ref: ${{ inputs.ref || github.sha }}     # build the cron's rebased SHA when called

      - name: Resolve build SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=commit-${{ steps.sha.outputs.sha }}   # tag the exact built commit

      - name: Build and push (mayhem/Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: mayhem/Dockerfile
          push: true
          build-args: |
            COMMIT=${{ steps.sha.outputs.sha }}
            REPO_URL=${{ github.server_url }}/${{ github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      ref: ${{ steps.sha.outputs.sha }}

  mayhem:
    needs: build
    name: 'fuzz ${{ matrix.mayhemfile }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mayhemfile:                 # one entry per mayhem/Mayhemfile_* (FULL OSS-Fuzz parity: all 42 src/fuzzer/*.cpp)
          - mayhem/Mayhemfile_asn1
          - mayhem/Mayhemfile_cert
          - mayhem/Mayhemfile_crl
          - mayhem/Mayhemfile_x509_dn
          - mayhem/Mayhemfile_pkcs8
          - mayhem/Mayhemfile_pkcs1
          - mayhem/Mayhemfile_oaep
          - mayhem/Mayhemfile_uri
          - mayhem/Mayhemfile_ipv4
          - mayhem/Mayhemfile_tls_client
          - mayhem/Mayhemfile_tls_server
          - mayhem/Mayhemfile_barrett
          - mayhem/Mayhemfile_bn_cmp
          - mayhem/Mayhemfile_bn_sqr
          - mayhem/Mayhemfile_divide
          - mayhem/Mayhemfile_ec_scalar
          - mayhem/Mayhemfile_ecc_bp256
          - mayhem/Mayhemfile_ecc_bp384
          - mayhem/Mayhemfile_ecc_bp512
          - mayhem/Mayhemfile_ecc_frp256
          - mayhem/Mayhemfile_ecc_numsp512
          - mayhem/Mayhemfile_ecc_p224
          - mayhem/Mayhemfile_ecc_p256
          - mayhem/Mayhemfile_ecc_p384
          - mayhem/Mayhemfile_ecc_p521
          - mayhem/Mayhemfile_ecc_secp256k1
          - mayhem/Mayhemfile_ecc_sm2p256
          - mayhem/Mayhemfile_gcd
          - mayhem/Mayhemfile_invert
          - mayhem/Mayhemfile_mem_pool
          - mayhem/Mayhemfile_mode_padding
          - mayhem/Mayhemfile_mp_comba_mul
          - mayhem/Mayhemfile_mp_comba_sqr
          - mayhem/Mayhemfile_mp_redc
          - mayhem/Mayhemfile_mp_redc_crandall
          - mayhem/Mayhemfile_ocsp
          - mayhem/Mayhemfile_os2ecp
          - mayhem/Mayhemfile_pow_mod
          - mayhem/Mayhemfile_ressol
          - mayhem/Mayhemfile_tls_13_handshake_layer
          - mayhem/Mayhemfile_tls_client_hello
          - mayhem/Mayhemfile_x509_path
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.build.outputs.ref }}
      - name: Start analysis for ${{ matrix.mayhemfile }}
        uses: ForAllSecure/mcode-action@v1
        with:
          mayhem-token: ${{ secrets.MAYHEM_TOKEN }}
          args: --image ${{ needs.build.outputs.image }} --file ${{ matrix.mayhemfile }} --duration ${{ inputs.duration || '1200' }}
